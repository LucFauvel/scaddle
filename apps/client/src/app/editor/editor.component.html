<div class="h-full w-full flex flex-col">
  <!-- Top section with renderer and editor -->
  <div class="flex-grow relative">
    <button (click)="toggleEditor()" class="absolute top-7 z-20 bg-gray-800 ml-2 text-white p-2 rounded-full transform -translate-y-1/2 transition-all duration-300 ease-in-out" [ngClass]="{'left-1/2': isEditorVisible}">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path *ngIf="!isEditorVisible" stroke-linecap="round" stroke-linejoin="round" d="M6.75 7.75L3 12l3.75 4.25M17.25 7.75L21 12l-3.75 4.25M13.5 1.5L10.5 22.5" />
        <path *ngIf="isEditorVisible" stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" />
      </svg>
    </button>

    <div [ngClass]="{'w-1/2': isEditorVisible, 'w-0': !isEditorVisible}" class="h-full absolute top-0 left-0 z-10 transition-all duration-300 ease-in-out overflow-hidden">
      <div class="h-full" #editorContainer></div>

    </div>

    <app-renderer [stlBytes]="currentStl()" class="absolute h-full w-full"></app-renderer>
  </div>

    <div class="flex flex-row h-1/4 bg-neutral-900">
      <div class="flex-grow">
        <app-chat (codeReceived)="onCodeReceived($event)" class="h-full"></app-chat>
      </div>
      <div class="flex flex-none justify-between items-center p-2 bg-neutral-800">
        <button type="button" class="bg-gray-200 p-2 rounded bg-gradient-to-b" (click)="saveStl()">Save STL</button>
        <button type="button" class="bg-gray-200 p-2 rounded bg-gradient-to-b" (click)="render()">Render</button>
      </div>
    </div>
</div>
