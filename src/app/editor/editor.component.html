<div class="flex flex-row h-full w-full">
  <div class="flex flex-col flex-1/2 h-full">
    <div class="grow">
      <div class="h-full" #editorContainer></div>
    </div>
    <div class="flex flex-none justify-between items-center p-2 bg-neutral-800">
      <button type="button" class="bg-gray-200 p-2 rounded bg-gradient-to-b" (click)="render()">Render</button>
      <button type="button" class="bg-gray-200 p-2 rounded bg-gradient-to-b" (click)="saveStl()">Save STL</button>
    </div>
  </div>
  <app-renderer [stlBytes]="currentStl()" class="h-full flex-1/2"></app-renderer>
</div>
